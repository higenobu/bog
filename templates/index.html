<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bag of Words</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 180px;
            padding: 10px;
            font-size: 16px;
        }
        button {
            margin-top: 10px;
            padding: 10px 16px;
            font-size: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #f4f4f4;
        }
        .summary {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Bag of Words Report</h1>

    <form method="post">
        <label for="text">Enter text:</label><br>
        <textarea name="text" id="text">{{ text }}</textarea><br>
        <button type="submit">Analyze</button>
    </form>

    {% if results %}
        <div class="summary">
            <p><strong>Total unique words:</strong> {{ total_unique }}</p>
            <p><strong>Total words counted:</strong> {{ total_words }}</p>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Word</th>
                    <th>Count</th>
                </tr>
            </thead>
            <tbody>
                {% for word, count in results %}
                <tr>
                    <td>{{ word }}</td>
                    <td>{{ count }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% endif %}
</body>
</html>
